name: Publicar Pacote NuGet

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    - name: Restaurar dependências
      run: dotnet restore
    - name: Criar Pacote
      run: dotnet pack --configuration Release
    - name: Publicar no GitHub Packages
      run: dotnet nuget push bin/Release/*.nupkg --source https://github.com{{ github.repository_owner }}/index.json --api-key ${{ secrets.GITHUB_TOKEN }}